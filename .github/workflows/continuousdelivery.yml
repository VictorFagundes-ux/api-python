name: Continuous Delivery

on:
  push:
    branches: [ "main" ]

jobs:
  cd:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: simulanaldo Continuous delivery
        uses: actions/upload-artifact@v4
        with:
          name: projetozip
          path: |
            '**.py'
            README.md